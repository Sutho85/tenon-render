<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TENON VISION | AI Kitchen Rendering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@fal-ai/client@^1.0.0/dist/bundle.min.js"></script>
    <style>
        .emerald-glow { box-shadow: 0 0 40px rgba(16, 185, 129, 0.15); }
        #dropzone { cursor: pointer !important; transition: all 0.3s ease; }
        #dropzone:hover { border-color: #10b981; background: rgba(16, 185, 129, 0.05); }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans min-h-screen">

    <nav class="flex justify-between items-center px-8 py-6 max-w-7xl mx-auto">
        <div class="text-2xl font-black tracking-tighter text-emerald-400 font-mono italic">TENON <span class="text-white">VISION</span></div>
        <span class="text-slate-500 text-xs font-mono uppercase tracking-widest">v1.0.4 Secure</span>
    </nav>

    <main class="max-w-6xl mx-auto px-6 pt-10 pb-24 text-center">
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight">From CAD to <span class="text-emerald-400">Cinematic.</span></h1>
        <p class="text-slate-400 text-lg mb-12 italic">The professional rendering engine for Cabinet Vision & Mozaik users.</p>

        <div class="grid lg:grid-cols-2 gap-8 text-left">
            
            <div id="dropzone" class="relative border-2 border-dashed border-slate-800 rounded-[2.5rem] p-12 bg-slate-900/40 flex flex-col items-center justify-center min-h-[450px]">
                <input type="file" id="fileInput" style="display:none;" accept="image/*">
                
                <div id="upload-content" class="flex flex-col items-center space-y-4">
                    <div class="w-20 h-20 bg-emerald-500/10 rounded-3xl flex items-center justify-center">
                        <svg class="w-10 h-10 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </div>
                    <div class="text-center">
                        <p class="text-2xl font-bold">Click to Upload CAD Screen</p>
                        <p class="text-slate-500 mt-2">JPG, PNG, or WebP</p>
                    </div>
                </div>

                <img id="preview" class="hidden absolute inset-0 w-full h-full object-contain p-6 rounded-[2.5rem] bg-slate-900">
            </div>

            <div class="bg-slate-900/60 rounded-[2.5rem] border border-slate-800 p-10 flex flex-col items-center justify-center min-h-[450px] emerald-glow">
                <div id="status" class="text-slate-500 font-mono text-[10px] uppercase tracking-[0.3em] mb-6">Engine: Standby</div>
                
                <img id="resultImage" class="hidden w-full rounded-2xl shadow-2xl border border-emerald-500/30 mb-6">
                
                <div id="controls" class="hidden w-full space-y-5">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Select Material Finish</label>
                        <select id="styleSelect" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl text-sm outline-none focus:border-emerald-500 transition-all">
                            <option value="Modern Kitchen, high-gloss white cabinets, marble counters, warm architectural lighting">Modern White & Marble</option>
                            <option value="Rustic Industrial, aged oak wood cabinets, black hardware, moody cinematic lighting">Industrial Aged Oak</option>
                            <option value="Clean Hampton style, white shaker cabinets, brass handles, bright natural light">Hampton Shaker</option>
                        </select>
                    </div>
                    <button id="renderBtn" class="w-full bg-emerald-500 text-black font-black py-5 rounded-2xl hover:bg-emerald-400 transition-all uppercase tracking-tighter text-lg shadow-lg shadow-emerald-500/20">
                        Generate Vision
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Use the Proxy path we set up in Step 2
        fal.config({ proxyUrl: "/api/fal/proxy" });

        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');
        const preview = document.getElementById('preview');
        const renderBtn = document.getElementById('renderBtn');
        const resultImage = document.getElementById('resultImage');
        const status = document.getElementById('status');
        const controls = document.getElementById('controls');
        const styleSelect = document.getElementById('styleSelect');
        const uploadContent = document.getElementById('upload-content');

        // FORCE THE CLICK
        dropzone.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    preview.src = event.target.result;
                    preview.classList.remove('hidden');
                    uploadContent.classList.add('hidden');
                    controls.classList.remove('hidden');
                    status.innerHTML = "Engine: Image Ready";
                    status.classList.replace('text-slate-500', 'text-emerald-400');
                }
                reader.readAsDataURL(file);
            }
        });

        renderBtn.onclick = async () => {
            renderBtn.disabled = true;
            renderBtn.innerHTML = "RENDERING...";
            status.innerHTML = "Engine: Processing Textures...";

            try {
                const result = await fal.subscribe("fal-ai/fast-sdxl-controlnet-canny", {
                    input: {
                        control_image_url: preview.src,
                        prompt: `Professional 8k interior kitchen photography, ${styleSelect.value}, highly detailed, photorealistic`,
                        image_size: "landscape_16_9",
                        controlnet_conditioning_scale: 0.9
                    },
                });

                resultImage.src = result.data.images[0].url;
                resultImage.classList.remove('hidden');
                status.innerHTML = "Engine: Success";
                renderBtn.innerHTML = "RENDER COMPLETE";
                renderBtn.disabled = false;
            } catch (err) {
                console.error(err);
                status.innerHTML = "Engine: Error (Check Vercel Key)";
                renderBtn.innerHTML = "RETRY";
                renderBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
