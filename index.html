<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TENON VISION v1.2.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fal-client/1.0.1/bundle.min.js"></script>
</head>
<body class="bg-slate-950 text-white p-10 font-sans">

    <div class="max-w-xl mx-auto space-y-8">
        <header class="text-center">
            <h1 class="text-2xl font-black text-emerald-400 uppercase italic">Tenon Vision</h1>
            <p id="status-bar" class="text-[10px] font-mono text-slate-500 mt-2 uppercase">v1.2.7 - BYPASS MODE</p>
        </header>

        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <input type="file" id="fileIn" accept="image/*" class="block w-full text-sm text-slate-500 file:bg-emerald-500 file:text-black file:px-4 file:py-2 file:rounded-lg file:border-0 file:font-bold cursor-pointer">
        </div>

        <div class="bg-black rounded-2xl border border-slate-800 p-4 min-h-[200px] flex items-center justify-center overflow-hidden">
            <img id="view" class="hidden w-full h-auto rounded-lg shadow-2xl">
            <p id="placeholder" class="text-slate-800 font-mono text-[10px]">Awaiting CAD Image...</p>
        </div>

        <div id="controls" class="hidden bg-slate-900 p-6 rounded-2xl border border-slate-800 space-y-4">
            <select id="style" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl text-white font-bold text-sm">
                <option value="Modern luxury kitchen, white marble, architectural lighting">Modern White Marble</option>
                <option value="Industrial kitchen, aged oak, black hardware">Industrial Aged Oak</option>
            </select>
            <button id="go" onclick="runRender()" class="w-full bg-white text-black font-black py-4 rounded-xl hover:bg-emerald-500 transition-all uppercase text-sm">Generate AI Vision</button>
            <div id="ai-msg" class="text-center text-[10px] font-mono text-slate-500 uppercase mt-4 italic">Engine Standby</div>
            <img id="out" class="hidden w-full rounded-lg mt-4 border border-emerald-500/20 shadow-2xl">
        </div>
    </div>

    <script>
        const statusBar = document.getElementById('status-bar');
        const fileIn = document.getElementById('fileIn');
        const view = document.getElementById('view');
        const placeholder = document.getElementById('placeholder');
        const controls = document.getElementById('controls');

        // Check for the library immediately
        function checkLibrary() {
            if (typeof fal !== 'undefined') {
                fal.config({ proxyUrl: "/api/fal/proxy" });
                statusBar.innerText = "v1.2.7 - ENGINE ATTACHED";
                statusBar.style.color = "#10b981";
            } else {
                statusBar.innerText = "RETRYING CONNECTION...";
                setTimeout(checkLibrary, 2000); // Try again in 2 seconds
            }
        }
        checkLibrary();

        fileIn.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    view.src = ev.target.result;
                    view.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                    controls.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        async function runRender() {
            const go = document.getElementById('go');
            const aiMsg = document.getElementById('ai-msg');
            const out = document.getElementById('out');

            if (typeof fal === 'undefined') {
                alert("The AI library is still being blocked by your browser. Try turning off Ad-Blockers or using a different browser (like Firefox or Chrome).");
                return;
            }

            go.disabled = true;
            aiMsg.innerHTML = "System: Sending to AI...";

            try {
                const res = await fal.subscribe("fal-ai/fast-sdxl-controlnet-canny", {
                    input: {
                        control_image_url: view.src,
                        prompt: `8k kitchen render, ${document.getElementById('style').value}, photorealistic`,
                        image_size: "landscape_16_9",
                        controlnet_conditioning_scale: 0.95
                    }
                });
                out.src = res.data.images[0].url;
                out.classList.remove('hidden');
                aiMsg.innerHTML = "Success!";
            } catch (e) {
                aiMsg.innerHTML = "Error: Check Vercel API Key";
            }
            go.disabled = false;
        }
    </script>
</body>
</html>
