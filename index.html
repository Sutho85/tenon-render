<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TENON VISION | AI Rendering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@fal-ai/client@^1.0.0/dist/bundle.min.js"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans">

    <div class="fixed top-2 right-2 text-[10px] text-emerald-500 font-mono bg-slate-900 px-2 py-1 rounded">v1.0.5 LIVE</div>

    <nav class="p-8 max-w-7xl mx-auto flex justify-between">
        <div class="text-2xl font-black italic text-emerald-400">TENON <span class="text-white">VISION</span></div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-12 text-center">
        <h1 class="text-5xl font-extrabold mb-4 leading-tight">CAD to <span class="text-emerald-400">Reality.</span></h1>
        <p class="text-slate-400 mb-12 italic">Upload a Cabinet Vision screenshot to generate a photo-style render.</p>

        <div class="grid md:grid-cols-2 gap-8 text-left">
            <div id="box" class="border-2 border-dashed border-slate-800 rounded-3xl p-10 bg-slate-900/50 flex flex-col items-center justify-center min-h-[350px] cursor-pointer hover:border-emerald-500 transition-all">
                <input type="file" id="fileIn" style="display:none;" accept="image/*">
                <div id="prompt-text">
                    <p class="text-xl font-bold text-center">Click to Upload Screenshot</p>
                    <p class="text-slate-500 text-sm text-center mt-2">Select your cabinet drawing</p>
                </div>
                <img id="view" class="hidden w-full h-full object-contain rounded-2xl">
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8 flex flex-col items-center justify-center min-h-[350px]">
                <div id="msg" class="text-slate-500 text-xs font-mono uppercase tracking-widest mb-4">Ready</div>
                <img id="out" class="hidden w-full rounded-xl shadow-2xl mb-4">
                
                <div id="btn-group" class="hidden w-full space-y-4">
                    <select id="style" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl text-sm outline-none">
                        <option value="Modern, white marble, luxury lighting">Modern White Marble</option>
                        <option value="Industrial, dark wood, black hardware">Industrial Dark Wood</option>
                    </select>
                    <button id="go" class="w-full bg-emerald-500 text-black font-black py-4 rounded-xl hover:bg-emerald-400 uppercase tracking-tight">Generate Vision</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Use the exact proxy path
        fal.config({ proxyUrl: "/api/fal/proxy" });

        const box = document.getElementById('box');
        const fileIn = document.getElementById('fileIn');
        const view = document.getElementById('view');
        const msg = document.getElementById('msg');
        const out = document.getElementById('out');
        const btnGroup = document.getElementById('btn-group');
        const go = document.getElementById('go');
        const style = document.getElementById('style');
        const promptText = document.getElementById('prompt-text');

        // FORCE CLICK
        box.onclick = () => fileIn.click();

        fileIn.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    view.src = ev.target.result;
                    view.classList.remove('hidden');
                    promptText.classList.add('hidden');
                    btnGroup.classList.remove('hidden');
                    msg.innerHTML = "Image Loaded";
                };
                reader.readAsDataURL(file);
            }
        };

        go.onclick = async () => {
            go.disabled = true;
            msg.innerHTML = "🎨 Rendering... (20s)";
            try {
                const res = await fal.subscribe("fal-ai/fast-sdxl-controlnet-canny", {
                    input: {
                        control_image_url: view.src,
                        prompt: `8k kitchen render, ${style.value}, photorealistic`,
                        image_size: "landscape_16_9"
                    }
                });
                out.src = res.data.images[0].url;
                out.classList.remove('hidden');
                msg.innerHTML = "Render Complete!";
            } catch (e) {
                msg.innerHTML = "Error: Check Vercel Key";
            }
            go.disabled = false;
        };
    </script>
</body>
</html>
