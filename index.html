<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TENON VISION | AI Rendering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@fal-ai/client@^1.0.0/dist/bundle.min.js"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans">

    <div class="fixed top-2 right-2 text-[10px] text-emerald-400 font-mono bg-slate-900 px-2 py-1 rounded border border-emerald-400/20 shadow-lg">v1.0.9 SOLID</div>

    <nav class="p-8 max-w-7xl mx-auto flex justify-between">
        <div class="text-2xl font-black italic text-emerald-400 tracking-tighter uppercase">TENON <span class="text-white font-normal">VISION</span></div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-12">
        <div class="grid md:grid-cols-2 gap-12 items-center">
            
            <div class="space-y-6">
                <h1 class="text-6xl font-extrabold tracking-tighter leading-none">CAD to <span class="text-emerald-400">REALITY.</span></h1>
                <p class="text-slate-400 text-lg leading-relaxed italic">Upload your Cabinet Vision or Mozaik screenshot. Close the deal with a cinematic render.</p>
                
                <div id="upload-zone" class="border-2 border-dashed border-slate-800 rounded-3xl p-8 bg-slate-900/50 flex flex-col items-center justify-center min-h-[300px]">
                    <input type="file" id="fileIn" class="hidden" accept="image/*">
                    
                    <button id="clickBtn" class="bg-emerald-500 text-black font-black px-8 py-4 rounded-2xl hover:bg-emerald-400 transition-all shadow-lg shadow-emerald-500/20 flex items-center gap-3">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                        SELECT CAD IMAGE
                    </button>
                    <p class="text-slate-500 text-xs mt-4 font-mono">JPG, PNG, OR WEBP SCREENSHOTS</p>
                    
                    <img id="view" class="hidden mt-6 w-full max-h-[300px] object-contain rounded-xl border border-slate-700">
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-[2.5rem] p-10 flex flex-col items-center justify-center min-h-[500px] shadow-2xl">
                <div id="msg" class="text-slate-600 font-mono text-[10px] uppercase tracking-widest mb-6">Status: Awaiting Image</div>
                
                <img id="out" class="hidden w-full rounded-2xl shadow-2xl border border-emerald-500/20 mb-8">
                
                <div id="controls" class="hidden w-full space-y-6">
                    <div class="space-y-2">
                        <label class="text-[9px] font-bold text-slate-500 uppercase tracking-widest ml-1">Style Selection</label>
                        <select id="style" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl text-sm outline-none focus:border-emerald-500">
                            <option value="Modern luxury kitchen, white marble countertops, high-gloss white cabinetry, warm cinematic architectural lighting">Modern White Marble</option>
                            <option value="Industrial kitchen, aged oak wood cabinets, black matte hardware, moody cinematic lighting">Industrial Aged Oak</option>
                            <option value="Classic Hampton style, white shaker cabinets, polished brass handles, bright natural morning light">Hampton Shaker</option>
                        </select>
                    </div>
                    <button id="go" class="w-full bg-white text-black font-black py-5 rounded-2xl hover:bg-emerald-400 hover:text-black transition-all uppercase tracking-tighter text-lg">Generate Vision</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Setup Proxy
        fal.config({ proxyUrl: "/api/fal/proxy" });

        const fileIn = document.getElementById('fileIn');
        const clickBtn = document.getElementById('clickBtn');
        const view = document.getElementById('view');
        const msg = document.getElementById('msg');
        const out = document.getElementById('out');
        const controls = document.getElementById('controls');
        const go = document.getElementById('go');
        const style = document.getElementById('style');

        // Simple, Direct Click
        clickBtn.onclick = () => fileIn.click();

        fileIn.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    view.src = ev.target.result;
                    view.classList.remove('hidden');
                    controls.classList.remove('hidden');
                    clickBtn.innerHTML = "CHANGE IMAGE";
                    clickBtn.classList.replace('bg-emerald-500', 'bg-slate-800');
                    clickBtn.classList.replace('text-black', 'text-white');
                    msg.innerHTML = "Status: Image Ready";
                    msg.classList.replace('text-slate-600', 'text-emerald-500');
                };
                reader.readAsDataURL(file);
            }
        };

        go.onclick = async () => {
            go.disabled = true;
            go.innerHTML = "RENDERING...";
            msg.innerHTML = "Status: Mixing Materials... (20s)";
            
            try {
                const res = await fal.subscribe("fal-ai/fast-sdxl-controlnet-canny", {
                    input: {
                        control_image_url: view.src,
                        prompt: `A high-end architectural photo of a kitchen, ${style.value}, photorealistic, masterfully lit`,
                        image_size: "landscape_16_9",
                        controlnet_conditioning_scale: 0.95
                    }
                });
                out.src = res.data.images[0].url;
                out.classList.remove('hidden');
                msg.innerHTML = "Status: Success";
                go.innerHTML = "NEW RENDER";
            } catch (e) {
                console.error(e);
                msg.innerHTML = "Status: Error (Check Vercel Key)";
                go.innerHTML = "RETRY";
            }
            go.disabled = false;
        };
    </script>
</body>
</html>
