<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TENON VISION v1.3.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-6 font-sans">

    <div class="max-w-xl mx-auto space-y-6">
        <header class="text-center border-b border-slate-800 pb-4">
            <h1 class="text-2xl font-black text-emerald-400 uppercase italic">Tenon Vision</h1>
            <p id="status-bar" class="text-[10px] font-mono text-slate-500 mt-2 uppercase text-emerald-500">v1.3.4 - SYNCING...</p>
        </header>

        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <input type="file" id="fileIn" accept="image/*" class="block w-full text-sm text-slate-500 file:bg-emerald-500 file:text-black file:px-4 file:py-2 file:rounded-lg file:border-0 file:font-bold cursor-pointer">
        </div>

        <div class="bg-black rounded-2xl border border-slate-800 p-2 min-h-[200px] flex items-center justify-center">
            <img id="view" class="hidden w-full h-auto rounded-lg">
            <p id="placeholder" class="text-slate-800 font-mono text-[10px]">Awaiting Image...</p>
        </div>

        <div id="controls" class="hidden bg-slate-900 p-6 rounded-2xl border border-slate-800 space-y-4 text-center">
            <button id="go" class="w-full bg-emerald-500 text-black font-black py-4 rounded-xl hover:bg-emerald-400 transition-all uppercase text-sm">Generate Vision</button>
            <div id="ai-msg" class="text-[10px] font-mono text-slate-400 uppercase mt-2">Ready</div>
            <img id="out" class="hidden w-full rounded-lg mt-4 border border-emerald-500/20">
        </div>
    </div>

    <script type="module">
        import * as fal from 'https://cdn.skypack.dev/pin/@fal-ai/client@v1.0.1-v7E6PZ9jZ0uPZz8zX9Xz/mode=imports/optimized/@fal-ai/client';

        const statusBar = document.getElementById('status-bar');
        const fileIn = document.getElementById('fileIn');
        const view = document.getElementById('view');
        const go = document.getElementById('go');
        const aiMsg = document.getElementById('ai-msg');
        const out = document.getElementById('out');

        try {
            fal.config({ proxyUrl: "/api/fal/proxy" });
            window.fal = fal;
            statusBar.innerText = "v1.3.4 - ENGINE ONLINE";
            statusBar.classList.replace('text-slate-500', 'text-emerald-400');
        } catch (e) {
            statusBar.innerText = "LINK ERROR";
            statusBar.classList.replace('text-slate-500', 'text-red-500');
        }

        fileIn.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    view.src = ev.target.result;
                    view.classList.remove('hidden');
                    document.getElementById('placeholder').classList.add('hidden');
                    document.getElementById('controls').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        go.onclick = async () => {
            go.disabled = true;
            aiMsg.innerHTML = "RENDERING...";
            try {
                const res = await window.fal.subscribe("fal-ai/fast-sdxl-controlnet-canny", {
                    input: {
                        control_image_url: view.src,
                        prompt: "High-end kitchen photo, modern cabinetry, marble island, 8k",
                        image_size: "landscape_16_9",
                        controlnet_conditioning_scale: 0.95
                    }
                });
                out.src = res.data.images[0].url;
                out.classList.remove('hidden');
                aiMsg.innerHTML = "SUCCESS";
            } catch (e) {
                aiMsg.innerHTML = "ERROR: CHECK API KEY";
            }
            go.disabled = false;
        };
    </script>
</body>
</html>
