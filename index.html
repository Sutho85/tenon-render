<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TENON VISION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@fal-ai/client@1.0.1/dist/bundle.min.js" crossorigin="anonymous"></script>
</head>
<body class="bg-slate-950 text-white p-6 font-sans">
    <div class="max-w-xl mx-auto space-y-6">
        <header class="text-center border-b border-slate-800 pb-4">
            <h1 class="text-2xl font-black text-emerald-400 uppercase italic italic">Tenon Vision</h1>
            <p id="status-bar" class="text-[10px] font-mono text-slate-500 mt-2 uppercase">Connecting...</p>
        </header>

        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <input type="file" id="fileIn" accept="image/*" class="block w-full text-sm text-slate-500 file:bg-emerald-500 file:text-black file:px-4 file:py-2 file:rounded-lg file:border-0 file:font-bold cursor-pointer">
        </div>

        <div id="controls" class="hidden bg-slate-900 p-6 rounded-2xl border border-slate-800 space-y-4 text-center">
            <button id="go" onclick="runRender()" class="w-full bg-emerald-500 text-black font-black py-4 rounded-xl hover:bg-emerald-400 transition-all uppercase text-sm">Generate Render</button>
            <div id="ai-msg" class="text-[10px] font-mono text-slate-400 uppercase mt-2">Ready</div>
            <img id="out" class="hidden w-full rounded-lg mt-4 border border-emerald-500/20">
        </div>
    </div>

    <script>
        window.onload = () => {
            const status = document.getElementById('status-bar');
            if (typeof fal !== 'undefined') {
                fal.config({ proxyUrl: "/api/fal/proxy" });
                status.innerText = "Engine Online";
                status.style.color = "#10b981";
            } else {
                status.innerText = "Connection Failed";
                status.style.color = "#ef4444";
            }
        };

        const fileIn = document.getElementById('fileIn');
        fileIn.onchange = () => document.getElementById('controls').classList.remove('hidden');

        async function runRender() {
            const file = fileIn.files[0];
            const reader = new FileReader();
            reader.onload = async (e) => {
                const aiMsg = document.getElementById('ai-msg');
                aiMsg.innerText = "Rendering...";
                try {
                    const res = await fal.subscribe("fal-ai/fast-sdxl-controlnet-canny", {
                        input: { 
                            control_image_url: e.target.result,
                            prompt: "Modern luxury kitchen, marble, 8k",
                        }
                    });
                    document.getElementById('out').src = res.data.images[0].url;
                    document.getElementById('out').classList.remove('hidden');
                    aiMsg.innerText = "Success";
                } catch (err) {
                    aiMsg.innerText = "Error: Check API Key";
                }
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
