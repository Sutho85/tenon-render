<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TENON VISION | AI Rendering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@fal-ai/client@^1.0.0/dist/bundle.min.js"></script>
</head>
<body class="bg-slate-950 text-white font-sans">

    <nav class="flex justify-between items-center px-8 py-6 max-w-7xl mx-auto">
        <div class="text-2xl font-bold tracking-tighter text-emerald-400 font-mono italic">TENON <span class="text-white">VISION</span></div>
        <button class="bg-emerald-500 text-black px-6 py-2 rounded-full text-sm font-bold">BETA ACCESS</button>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold mb-4">Upload Your CAD Screenshot</h1>
            <p class="text-slate-400 italic">"Engineering is for you. Emotion is for them."</p>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            <div id="dropzone" class="border-2 border-dashed border-slate-800 rounded-3xl p-12 flex flex-col items-center justify-center bg-slate-900/50 hover:border-emerald-500 transition cursor-pointer">
                <input type="file" id="fileInput" class="hidden" accept="image/*">
                <div id="upload-label" class="text-center">
                    <div class="text-5xl mb-4">📸</div>
                    <p class="text-lg font-bold">Click to Upload Screenshot</p>
                    <p class="text-slate-500 text-sm mt-2">Supports Cabinet Vision, Mozaik, SketchUp</p>
                </div>
                <img id="preview" class="hidden w-full rounded-xl mt-4 border border-slate-700">
            </div>

            <div class="bg-slate-900 rounded-3xl border border-slate-800 p-6 flex flex-col items-center justify-center relative min-h-[400px]">
                <div id="status" class="text-slate-500 text-center font-mono uppercase tracking-widest text-sm">
                    Awaiting Input...
                </div>
                <img id="resultImage" class="hidden w-full h-full object-cover rounded-xl shadow-2xl">
                
                <button id="renderBtn" class="hidden mt-6 bg-emerald-500 text-black font-bold px-10 py-4 rounded-xl hover:scale-105 transition shadow-lg shadow-emerald-500/20">
                    GENERATE RENDER
                </button>
            </div>
        </div>
    </main>

    <script>
        // CONFIGURATION: THIS USES YOUR FAL_KEY FROM VERCEL
        fal.config({
          proxyUrl: "/api/proxy", // This tells the site to use your secret vault
        });
        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');
        const preview = document.getElementById('preview');
        const renderBtn = document.getElementById('renderBtn');
        const resultImage = document.getElementById('resultImage');
        const status = document.getElementById('status');
        let selectedFile = null;

        // 1. Handle File Selection
        dropzone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    preview.src = event.target.result;
                    preview.classList.remove('hidden');
                    document.getElementById('upload-label').classList.add('hidden');
                    renderBtn.classList.remove('hidden');
                }
                reader.readAsDataURL(selectedFile);
            }
        };

        // 2. The Render Magic
        renderBtn.onclick = async () => {
            renderBtn.disabled = true;
            status.innerHTML = "🎨 MIXING MATERIALS... (30s)";
            renderBtn.innerHTML = "PROCESSING...";

            try {
                // This connects to the Fal.ai engine
                // Note: You must have FAL_KEY set in Vercel for this to work
                const result = await fal.subscribe("fal-ai/fast-sdxl-controlnet-canny", {
                    input: {
                        control_image_url: preview.src,
                        prompt: "Ultra-realistic interior, high-end kitchen cabinetry, warm lighting, architectural photography style, 8k, photorealistic wood grain",
                        image_size: "landscape_16_9",
                        controlnet_conditioning_scale: 0.95
                    },
                });

                resultImage.src = result.data.images[0].url;
                resultImage.classList.remove('hidden');
                status.classList.add('hidden');
                renderBtn.innerHTML = "DONE! (Try Another)";
                renderBtn.disabled = false;
            } catch (err) {
                console.error(err);
                status.innerHTML = "❌ ERROR: CHECK API KEY IN VERCEL SETTINGS";
                renderBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
