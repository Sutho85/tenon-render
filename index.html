<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TENON VISION | AI Kitchen Rendering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@fal-ai/client@^1.0.0/dist/bundle.min.js"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .emerald-glow { box-shadow: 0 0 30px rgba(16, 185, 129, 0.15); }
        #dropzone.dragging { border-color: #10b981; background: rgba(16, 185, 129, 0.05); }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans selection:bg-emerald-500 min-h-screen">

    <nav class="flex justify-between items-center px-8 py-6 max-w-7xl mx-auto">
        <div class="text-2xl font-black tracking-tighter text-emerald-400 font-mono italic underline decoration-emerald-500/30">TENON <span class="text-white">VISION</span></div>
        <div class="hidden md:flex gap-6 text-sm font-medium text-slate-400 uppercase tracking-widest">
            <span>v1.0.0 Beta</span>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 pt-12 pb-24">
        <div class="text-center mb-16">
            <h1 class="text-5xl md:text-6xl font-extrabold mb-6 tracking-tight">
                From CAD to <span class="text-emerald-400 italic">Cinematic.</span>
            </h1>
            <p class="text-slate-400 text-lg max-w-2xl mx-auto leading-relaxed">
                Take a screenshot in Cabinet Vision. Upload it here. <br/>
                Close the deal with a render that looks like a photoshoot.
            </p>
        </div>

        <div class="grid lg:grid-cols-2 gap-12 items-start">
            
            <div id="dropzone" class="group relative border-2 border-dashed border-slate-800 rounded-[2rem] p-1 bg-slate-900/40 hover:border-emerald-500/50 transition-all duration-500 cursor-pointer overflow-hidden min-h-[400px] flex flex-col items-center justify-center">
                <input type="file" id="fileInput" class="hidden" accept="image/*">
                
                <div id="upload-content" class="py-20 flex flex-col items-center justify-center space-y-4 text-center">
                    <div class="w-20 h-20 bg-emerald-500/10 rounded-3xl flex items-center justify-center group-hover:scale-110 transition-transform duration-500">
                        <svg class="w-10 h-10 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                    </div>
                    <div>
                        <p class="text-2xl font-bold tracking-tight">Drop CAD Screenshot</p>
                        <p class="text-slate-500 text-sm mt-2">Works with Cabinet Vision, Mozaik & SketchUp</p>
                    </div>
                </div>

                <img id="preview" class="hidden absolute inset-0 w-full h-full object-contain p-4 bg-slate-900">
            </div>

            <div class="bg-slate-900/60 rounded-[2rem] border border-slate-800 p-8 flex flex-col items-center justify-center relative min-h-[400px] emerald-glow">
                
                <div id="status" class="text-slate-600 text-center font-mono uppercase tracking-[0.2em] text-xs mb-4">
                    System Idle
                </div>

                <div id="image-container" class="hidden w-full h-full relative group">
                    <img id="resultImage" class="w-full h-full object-cover rounded-2xl shadow-2xl border border-emerald-500/20">
                    <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center rounded-2xl">
                         <button onclick="window.open(document.getElementById('resultImage').src)" class="bg-white text-black px-4 py-2 rounded-lg font-bold text-sm">View Full Res</button>
                    </div>
                </div>
                
                <div id="controls" class="hidden w-full space-y-4 mt-6">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Select Material Style</label>
                    <select id="styleSelect" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl text-sm outline-none focus:border-emerald-500 transition-colors">
                        <option value="Modern Kitchen with high-gloss white cabinetry, white marble countertops, and warm under-cabinet lighting. Realistic wood flooring.">Modern White Marble</option>
                        <option value="Rustic Industrial kitchen, black hardware, aged oak cabinetry, concrete countertops, cinematic moody lighting.">Industrial Aged Oak</option>
                        <option value="Classic Hampton style, white shaker cabinets, polished brass handles, bright airy natural morning light.">Hampton Shaker</option>
                        <option value="Luxury Minimalist, matte black cabinetry, walnut accents, hidden LED lighting, architectural design.">Midnight Minimalist</option>
                    </select>
                    <button id="renderBtn" class="w-full bg-emerald-500 text-black font-extrabold py-5 rounded-2xl hover:bg-emerald-400 transition-all shadow-lg shadow-emerald-500/20 uppercase tracking-tighter text-lg">
                        Generate High-End Render
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 1. Configure the Secure Proxy
        fal.config({
            proxyUrl: "/api/proxy", 
        });

        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');
        const preview = document.getElementById('preview');
        const renderBtn = document.getElementById('renderBtn');
        const resultImage = document.getElementById('resultImage');
        const imageContainer = document.getElementById('image-container');
        const status = document.getElementById('status');
        const controls = document.getElementById('controls');
        const styleSelect = document.getElementById('styleSelect');
        const uploadContent = document.getElementById('upload-content');

        // 2. Click to Upload Logic
        dropzone.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    preview.src = event.target.result;
                    preview.classList.remove('hidden');
                    uploadContent.classList.add('hidden');
                    controls.classList.remove('hidden');
                    status.innerHTML = "Image Loaded. Ready to Render.";
                    status.classList.replace('text-slate-600', 'text-emerald-500');
                }
                reader.readAsDataURL(file);
            }
        });

        // 3. The Render Execution
        renderBtn.onclick = async () => {
            renderBtn.disabled = true;
            status.innerHTML = "🎨 Applying Textures... (Approx 20s)";
            renderBtn.innerHTML = "PROCESSING...";

            try {
                // We use the 'Canny' model to keep your CAD lines perfect
                const result = await fal.subscribe("fal-ai/fast-sdxl-controlnet-canny", {
                    input: {
                        control_image_url: preview.src,
                        prompt: `A professional 8k interior kitchen render, ${styleSelect.value}, photorealistic, architectural photography style, highly detailed textures, masterfully lit`,
                        image_size: "landscape_16_9",
                        controlnet_conditioning_scale: 0.95 // Keeps the cabinet lines rigid
                    },
                });

                resultImage.src = result.data.images[0].url;
                imageContainer.classList.remove('hidden');
                status.innerHTML = "Render Complete.";
                renderBtn.innerHTML = "Done! (Generate New)";
                renderBtn.disabled = false;
            } catch (err) {
                console.error(err);
                status.innerHTML = "❌ Error: Key Missing in Vercel Settings";
                renderBtn.innerHTML = "Retry Render";
                renderBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
