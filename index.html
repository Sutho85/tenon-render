<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TENON VISION | AI Rendering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@fal-ai/client@^1.0.0/dist/bundle.min.js"></script>
    <style>
        .emerald-glow { box-shadow: 0 0 50px rgba(16, 185, 129, 0.2); }
        input[type="file"]::file-selector-button {
            background: #10b981;
            color: black;
            font-weight: 900;
            padding: 1rem 2rem;
            border-radius: 0.75rem;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }
        input[type="file"]::file-selector-button:hover { background: #34d399; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans">

    <div class="fixed top-2 right-2 text-[10px] text-emerald-400 font-mono bg-slate-900 px-2 py-1 rounded border border-emerald-400/20 shadow-lg">v1.1.3 DEBUG</div>

    <nav class="p-8 max-w-7xl mx-auto">
        <div class="text-2xl font-black italic text-emerald-400 tracking-tighter uppercase">TENON <span class="text-white font-normal">VISION</span></div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <div class="grid lg:grid-cols-2 gap-12">
            
            <div class="bg-slate-900/40 border-2 border-slate-800 rounded-[2.5rem] p-10">
                <h2 class="text-xl font-bold mb-6">1. Select CAD Drawing</h2>
                
                <input type="file" id="fileIn" class="w-full text-sm text-slate-500 mb-8" accept="image/*">

                <div id="preview-box" class="border-t border-slate-800 pt-8 min-h-[300px] flex items-center justify-center bg-black/20 rounded-2xl">
                    <p id="placeholder" class="text-slate-800 font-mono text-xs uppercase">Preview Area</p>
                    <img id="view" class="hidden w-full h-auto rounded-xl shadow-2xl border border-slate-700">
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-[2.5rem] p-10 flex flex-col items-center justify-center min-h-[500px] emerald-glow">
                <div id="msg" class="text-slate-500 font-mono text-[10px] uppercase tracking-[0.4em] mb-8 text-center">Engine: Standby</div>
                
                <img id="out" class="hidden w-full rounded-2xl shadow-2xl border border-emerald-500/20 mb-8">
                
                <div id="controls" class="hidden w-full space-y-6">
                    <select id="style" class="w-full bg-slate-800 border border-slate-700 p-5 rounded-2xl text-sm font-bold text-center">
                        <option value="Modern luxury kitchen, white marble countertops, warm lighting">Modern White Marble</option>
                        <option value="Industrial kitchen, aged oak wood, black hardware">Industrial Aged Oak</option>
                    </select>
                    <button id="go" class="w-full bg-white text-black font-black py-6 rounded-2xl hover:bg-emerald-500 transition-all uppercase text-xl shadow-lg">
                        2. Generate Vision
                    </button>
                </div>
            </div>

        </div>
    </main>

    <script>
        fal.config({ proxyUrl: "/api/fal/proxy" });

        const fileIn = document.getElementById('fileIn');
        const view = document.getElementById('view');
        const msg = document.getElementById('msg');
        const out = document.getElementById('out');
        const controls = document.getElementById('controls');
        const go = document.getElementById('go');
        const placeholder = document.getElementById('placeholder');

        fileIn.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                // This alert proves the code is actually running
                console.log("File detected: " + file.name);
                
                const reader = new FileReader();
                reader.onload = function(ev) {
                    view.src = ev.target.result;
                    view.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                    controls.classList.remove('hidden');
                    msg.innerHTML = "Engine: Image Ready";
                    msg.style.color = "#10b981";
                };
                reader.readAsDataURL(file);
            }
        });

        go.onclick = async function() {
            go.disabled = true;
            go.innerHTML = "RENDERING...";
            msg.innerHTML = "Engine: Processing... (20s)";
            
            try {
                const res = await fal.subscribe("fal-ai/fast-sdxl-controlnet-canny", {
                    input: {
                        control_image_url: view.src,
                        prompt: `High-end kitchen photo, ${document.getElementById('style').value}, 8k photorealistic`,
                        image_size: "landscape_16_9",
                        controlnet_conditioning_scale: 0.95
                    }
                });
                out.src = res.data.images[0].url;
                out.classList.remove('hidden');
                msg.innerHTML = "Engine: Success";
                go.innerHTML = "NEW RENDER";
            } catch (e) {
                msg.innerHTML = "Error: Check API Key";
                go.innerHTML = "RETRY";
            }
            go.disabled = false;
        };
    </script>
</body>
</html>
