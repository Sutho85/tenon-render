<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TENON VISION | AI Kitchen Rendering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@fal-ai/client@^1.0.0/dist/bundle.min.js"></script>
    <style>
        .emerald-glow { box-shadow: 0 0 30px rgba(16, 185, 129, 0.1); }
        #dropzone:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans min-h-screen">

    <nav class="flex justify-between items-center px-8 py-6 max-w-7xl mx-auto">
        <div class="text-2xl font-black tracking-tighter text-emerald-400 font-mono italic">TENON <span class="text-white">VISION</span></div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 pt-12 pb-24 text-center">
        <h1 class="text-5xl font-extrabold mb-4 tracking-tight">From CAD to <span class="text-emerald-400">Cinematic.</span></h1>
        <p class="text-slate-400 mb-12">Upload your screenshot to begin.</p>

        <div class="grid lg:grid-cols-2 gap-12 text-left">
            
            <div id="dropzone" style="cursor: pointer !important;" class="relative border-2 border-dashed border-slate-800 rounded-[2rem] p-12 bg-slate-900/40 hover:border-emerald-500 transition-all flex flex-col items-center justify-center min-h-[400px]">
                <input type="file" id="fileInput" class="hidden" accept="image/*">
                
                <div id="upload-content" class="flex flex-col items-center space-y-4">
                    <div class="w-16 h-16 bg-emerald-500/10 rounded-2xl flex items-center justify-center">
                        <svg class="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </div>
                    <p class="text-xl font-bold">Click here to upload</p>
                </div>

                <img id="preview" class="hidden absolute inset-0 w-full h-full object-contain p-4 rounded-[2rem] bg-slate-900">
            </div>

            <div class="bg-slate-900/60 rounded-[2rem] border border-slate-800 p-8 flex flex-col items-center justify-center min-h-[400px] emerald-glow">
                <div id="status" class="text-slate-600 font-mono text-xs mb-4">Awaiting Image...</div>
                <img id="resultImage" class="hidden w-full rounded-2xl shadow-2xl border border-emerald-500/20">
                
                <div id="controls" class="hidden w-full space-y-4 mt-6">
                    <select id="styleSelect" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl text-sm">
                        <option value="Modern Kitchen, white marble, warm lighting">Modern Marble</option>
                        <option value="Industrial Oak kitchen, black hardware, moody lighting">Industrial Oak</option>
                    </select>
                    <button id="renderBtn" class="w-full bg-emerald-500 text-black font-bold py-4 rounded-xl hover:bg-emerald-400 transition-all uppercase">
                        Generate Render
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 1. Setup Proxy
        fal.config({ proxyUrl: "/api/proxy" });

        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');
        const preview = document.getElementById('preview');
        const renderBtn = document.getElementById('renderBtn');
        const resultImage = document.getElementById('resultImage');
        const status = document.getElementById('status');
        const controls = document.getElementById('controls');
        const styleSelect = document.getElementById('styleSelect');

        // 2. Click Logic (The Fix)
        dropzone.onclick = function(e) {
            console.log("Box clicked!");
            fileInput.click();
        };

        fileInput.onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    preview.src = event.target.result;
                    preview.classList.remove('hidden');
                    controls.classList.remove('hidden');
                    status.innerHTML = "Image Loaded. Ready.";
                }
                reader.readAsDataURL(file);
            }
        };

        // 3. Render Logic
        renderBtn.onclick = async () => {
            renderBtn.disabled = true;
            status.innerHTML = "Processing AI Render...";
            try {
                const result = await fal.subscribe("fal-ai/fast-sdxl-controlnet-canny", {
                    input: {
                        control_image_url: preview.src,
                        prompt: `8k kitchen render, ${styleSelect.value}, photorealistic`,
                        image_size: "landscape_16_9"
                    },
                });
                resultImage.src = result.data.images[0].url;
                resultImage.classList.remove('hidden');
                status.innerHTML = "Success!";
            } catch (err) {
                status.innerHTML = "Error connecting to AI";
            }
            renderBtn.disabled = false;
        };
    </script>
</body>
</html>
