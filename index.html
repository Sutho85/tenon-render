<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TENON VISION | AI Rendering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@fal-ai/client@^1.0.0/dist/bundle.min.js"></script>
    <style>
        .emerald-glow { box-shadow: 0 0 50px rgba(16, 185, 129, 0.1); }
        /* Style the actual file input to look like a button */
        input[type="file"]::file-selector-button {
            background: #10b981;
            color: black;
            font-weight: 900;
            padding: 1.25rem 2rem;
            border-radius: 1rem;
            border: none;
            cursor: pointer;
            margin-right: 20px;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        input[type="file"]::file-selector-button:hover {
            background: #34d399;
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans">

    <div class="fixed top-2 right-2 text-[10px] text-emerald-400 font-mono bg-slate-900 px-2 py-1 rounded border border-emerald-400/20 shadow-lg">v1.1.1 STANDARD</div>

    <nav class="p-8 max-w-7xl mx-auto flex justify-between items-center">
        <div class="text-2xl font-black italic text-emerald-400 tracking-tighter uppercase">TENON <span class="text-white font-normal">VISION</span></div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <div class="grid lg:grid-cols-2 gap-16 items-start">
            
            <div class="space-y-8">
                <div>
                    <h1 class="text-7xl font-black tracking-tighter leading-[0.9] mb-4 uppercase">CAD TO <span class="text-emerald-500">REAL.</span></h1>
                    <p class="text-slate-400 text-lg italic">The professional rendering engine for Cabinet Vision.</p>
                </div>

                <div class="bg-slate-900/40 border-2 border-slate-800 rounded-[2.5rem] p-10">
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest mb-4 font-bold">Step 1: Upload Screenshot</p>
                    
                    <input type="file" id="fileIn" class="w-full text-sm text-slate-400 font-mono" accept="image/*">

                    <div id="preview-container" class="hidden w-full border-t border-slate-800 mt-8 pt-8">
                        <img id="view" class="w-full rounded-xl border border-slate-700 shadow-2xl max-h-[400px] object-contain">
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-[3rem] p-10 flex flex-col items-center justify-center min-h-[500px] emerald-glow">
                <div id="msg" class="text-slate-600 font-mono text-[10px] uppercase tracking-[0.4em] mb-8">System: Standby</div>
                
                <img id="out" class="hidden w-full rounded-2xl shadow-2xl border border-emerald-500/20 mb-8">
                
                <div id="controls" class="hidden w-full space-y-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Render Style</label>
                        <select id="style" class="w-full bg-slate-800 border border-slate-700 p-5 rounded-2xl text-sm outline-none focus:border-emerald-500 text-white font-bold">
                            <option value="Modern luxury kitchen, white marble countertops, high-gloss white cabinetry, warm architectural lighting">Modern White Marble</option>
                            <option value="Industrial kitchen, aged oak wood cabinets, black matte hardware, moody cinematic lighting">Industrial Aged Oak</option>
                            <option value="Classic Hampton style, white shaker cabinets, polished brass handles, bright natural morning light">Hampton Shaker</option>
                        </select>
                    </div>
                    <button id="go" class="w-full bg-white text-black font-black py-6 rounded-2xl hover:bg-emerald-500 transition-all uppercase tracking-tighter text-xl shadow-lg">
                        2. Generate Vision
                    </button>
                </div>
            </div>

        </div>
    </main>

    <script>
        fal.config({ proxyUrl: "/api/fal/proxy" });

        const fileIn = document.getElementById('fileIn');
        const view = document.getElementById('view');
        const msg = document.getElementById('msg');
        const out = document.getElementById('out');
        const controls = document.getElementById('controls');
        const go = document.getElementById('go');
        const style = document.getElementById('style');
        const previewContainer = document.getElementById('preview-container');

        fileIn.onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    view.src = ev.target.result;
                    previewContainer.classList.remove('hidden');
                    controls.classList.remove('hidden');
                    msg.innerHTML = "System: Image Loaded";
                    msg.classList.replace('text-slate-600', 'text-emerald-500');
                };
                reader.readAsDataURL(file);
            }
        };

        go.onclick = async function() {
            go.disabled = true;
            go.innerHTML = "RENDERING...";
            msg.innerHTML = "System: Processing... (20s)";
            
            try {
                const res = await fal.subscribe("fal-ai/fast-sdxl-controlnet-canny", {
                    input: {
                        control_image_url: view.src,
                        prompt: `High-end architectural photography, ${style.value}, 8k, photorealistic`,
                        image_size: "landscape_16_9",
                        controlnet_conditioning_scale: 0.95
                    }
                });
                out.src = res.data.images[0].url;
                out.classList.remove('hidden');
                msg.innerHTML = "System: Success";
                go.innerHTML = "GENERATE AGAIN";
            } catch (e) {
                msg.innerHTML = "System Error: Check Vercel Key";
                go.innerHTML = "RETRY";
            }
            go.disabled = false;
        };
    </script>
</body>
</html>
