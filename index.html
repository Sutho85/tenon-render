<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TENON VISION | AI Rendering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@fal-ai/client@^1.0.0/dist/bundle.min.js"></script>
</head>
<body class="bg-slate-950 text-white p-10">

    <div class="max-w-4xl mx-auto space-y-10">
        <header class="text-center">
            <h1 class="text-4xl font-black text-emerald-400 uppercase tracking-tighter">Tenon Vision</h1>
            <p class="text-slate-500 font-mono text-xs mt-2">v1.1.8 - NATIVE RESET</p>
        </header>

        <div class="grid md:grid-cols-2 gap-10">
            <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800 space-y-6">
                <h2 class="font-bold text-emerald-500 uppercase text-sm tracking-widest">Step 1: Upload</h2>
                
                <input type="file" id="fileInput" accept="image/*" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-emerald-500 file:text-black hover:file:bg-emerald-400 cursor-pointer">

                <div class="mt-4 border-t border-slate-800 pt-6">
                    <img id="preview" class="hidden w-full rounded-xl border border-slate-700 shadow-2xl">
                    <p id="pre-msg" class="text-slate-700 text-xs font-mono text-center">Preview will appear here</p>
                </div>
            </div>

            <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800 flex flex-col items-center justify-center">
                <div id="status" class="text-slate-500 font-mono text-[10px] uppercase mb-6 tracking-[0.3em]">Ready for Image</div>
                
                <img id="resultImage" class="hidden w-full rounded-xl mb-6 border border-emerald-500/20">

                <div id="controls" class="hidden w-full space-y-4">
                    <select id="styleSelect" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl text-sm font-bold">
                        <option value="Modern Kitchen, white marble, warm lighting">Modern White Marble</option>
                        <option value="Industrial Kitchen, dark oak, black hardware">Industrial Dark Oak</option>
                    </select>
                    <button id="renderBtn" class="w-full bg-white text-black font-black py-4 rounded-xl hover:bg-emerald-500 transition-all uppercase tracking-tighter">Generate Render</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Use the Proxy
        fal.config({ proxyUrl: "/api/fal/proxy" });

        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const preMsg = document.getElementById('pre-msg');
        const renderBtn = document.getElementById('renderBtn');
        const resultImage = document.getElementById('resultImage');
        const status = document.getElementById('status');
        const controls = document.getElementById('controls');

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    preview.src = event.target.result;
                    preview.classList.remove('hidden');
                    preMsg.classList.add('hidden');
                    controls.classList.remove('hidden');
                    status.innerHTML = "Image Loaded";
                }
                reader.readAsDataURL(file);
            }
        };

        renderBtn.onclick = async () => {
            renderBtn.disabled = true;
            renderBtn.innerHTML = "WORKING...";
            status.innerHTML = "Generating AI Render...";

            try {
                const result = await fal.subscribe("fal-ai/fast-sdxl-controlnet-canny", {
                    input: {
                        control_image_url: preview.src,
                        prompt: `8k photo of a kitchen, ${document.getElementById('styleSelect').value}, photorealistic`,
                        image_size: "landscape_16_9",
                        controlnet_conditioning_scale: 0.95
                    },
                });

                resultImage.src = result.data.images[0].url;
                resultImage.classList.remove('hidden');
                status.innerHTML = "Success!";
                renderBtn.innerHTML = "GENERATE AGAIN";
                renderBtn.disabled = false;
            } catch (err) {
                console.error(err);
                status.innerHTML = "Error: Check API Key";
                renderBtn.innerHTML = "RETRY";
                renderBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
